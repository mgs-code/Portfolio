<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Model</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<script>
  const viewer = document.querySelector("model-viewer");

  viewer.addEventListener("load", () => {
    const materials = viewer.model.materials;

    const darkGrey = [0.2, 0.2, 0.2, 1];

    materials.forEach((material) => {
      // set base color
      material.pbrMetallicRoughness.setBaseColorFactor(darkGrey);

      // make it matte plastic
      material.pbrMetallicRoughness.setMetallicFactor(0.0);
      material.pbrMetallicRoughness.setRoughnessFactor(0.8);

      // IMPORTANT: remove textures that override color
      material.pbrMetallicRoughness.baseColorTexture = null;
    });
  });
</script>
<body>

<model-viewer
  src="Cellphone_Stand.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  tone-mapping="neutral"
  poster="poster.webp"
  shadow-intensity="1"
  environment-image="legacy"
  camera-orbit="-362deg 179.3deg 0.2114m"
  field-of-view="30deg"
  orientation="0deg 270deg 0deg"
>
</model-viewer>

</body>
</html>
