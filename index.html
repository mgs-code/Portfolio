<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Model</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
</head>
<body style="margin:0;">

<model-viewer
  id="stand"
  src="Cellphone_Stand.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  tone-mapping="neutral"
  poster="poster.webp"
  shadow-intensity="1"
  environment-image="legacy"
  camera-orbit="-362deg 179.3deg 0.2114m"
  field-of-view="30deg"
  orientation="0deg 270deg 0deg"
  style="width: 100%; height: 100vh;"
>
</model-viewer>

<script>
  const viewer = document.getElementById("stand");

  viewer.addEventListener("load", () => {
    const material = viewer.model.materials[0];

    if (!material) return;

    material.pbrMetallicRoughness.setBaseColorFactor([0.97, 0.71, 0.78, 1]);
    material.pbrMetallicRoughness.setMetallicFactor(0.0);
    material.pbrMetallicRoughness.setRoughnessFactor(0.75);
  });
</script>

</body>
</html>
