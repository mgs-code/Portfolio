<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Model Viewer</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    /* IMPORTANT: Google Sites embed-safe layout */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    /* This is the key fix: NO 100vh */
    .viewer-container {
      width: 100%;
      height: 700px;   /* 👈 adjust this if needed (600–900px works best) */
      display: flex;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>

<body>

  <div class="viewer-container">

    <model-viewer
      src="Cellphone_Stand.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      tone-mapping="neutral"
      poster="poster.webp"
      shadow-intensity="1"
      environment-image="legacy"
      camera-orbit="-362deg 179deg 0.2114m"
      field-of-view="30deg"
      orientation="0deg 270deg 0deg"
      exposure="1"
      auto-rotate
    >
    </model-viewer>

  </div>

</body>
</html>
